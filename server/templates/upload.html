{% extends "base.html" %}
{% set active_page = "upload" %}
{% block title %}Upload — Urine Analyzer{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <h1 class="text-2xl font-bold mb-6">Upload Tray Image</h1>

  <div id="drop-zone"
       class="border-2 border-dashed border-gray-600 rounded-xl p-12 text-center cursor-pointer hover:border-blue-500 transition-colors"
       onclick="document.getElementById('file-input').click()">
    <svg class="mx-auto mb-4 w-12 h-12 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
    </svg>
    <p class="text-gray-400 mb-1">Drag & drop or click to select</p>
    <p class="text-gray-600 text-sm">JPEG / PNG</p>
    <input id="file-input" type="file" accept="image/jpeg,image/png" class="hidden"/>
    <div id="file-name" class="mt-3 text-blue-400 text-sm hidden"></div>
  </div>

  <button id="analyze-btn"
          class="mt-6 w-full py-3 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 disabled:cursor-not-allowed rounded-lg font-semibold transition-colors"
          disabled>
    Analyze
  </button>

  <div id="status" class="mt-4 hidden">
    <div class="flex items-center gap-3 bg-gray-800 rounded-lg p-4">
      <div id="spinner" class="w-5 h-5 border-2 border-blue-500 border-t-transparent rounded-full animate-spin hidden"></div>
      <span id="status-text" class="text-sm"></span>
    </div>
  </div>
</div>

<script>
const dropZone   = document.getElementById('drop-zone');
const fileInput  = document.getElementById('file-input');
const analyzeBtn = document.getElementById('analyze-btn');
const fileNameEl = document.getElementById('file-name');
const statusEl   = document.getElementById('status');
const statusText = document.getElementById('status-text');
const spinner    = document.getElementById('spinner');

let selectedFile = null;

fileInput.addEventListener('change', () => {
  if (fileInput.files.length) selectFile(fileInput.files[0]);
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('border-blue-500'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-blue-500'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('border-blue-500');
  if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
});

function selectFile(f) {
  selectedFile = f;
  fileNameEl.textContent = f.name;
  fileNameEl.classList.remove('hidden');
  analyzeBtn.disabled = false;
}

analyzeBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  analyzeBtn.disabled = true;
  statusEl.classList.remove('hidden');
  spinner.classList.remove('hidden');
  statusText.textContent = 'Analyzing...';
  statusText.className = 'text-sm text-blue-400';

  const formData = new FormData();
  formData.append('file', selectedFile);

  try {
    const res = await fetch('/analyze', {
      method: 'POST',
      headers: { 'x-auth-token': 'test' },
      body: formData,
    });
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.detail || 'Server error');
    }
    statusText.textContent = 'Done! Redirecting…';
    statusText.className = 'text-sm text-green-400';
    window.location.href = '/result/' + data.scan_id;
  } catch (err) {
    spinner.classList.add('hidden');
    statusText.textContent = 'Error: ' + err.message;
    statusText.className = 'text-sm text-red-400';
    analyzeBtn.disabled = false;
  }
});
</script>
{% endblock %}
