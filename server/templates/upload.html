{% extends "base.html" %}
{% set active_page = "upload" %}
{% block title %}อัพโหลด — วิเคราะห์ปัสสาวะ{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <h1 class="text-2xl font-bold mb-6">อัพโหลดภาพถาด</h1>

  <div id="drop-zone"
       class="border-2 border-dashed rounded-xl p-12 text-center cursor-pointer transition-colors"
       style="border-color:#2d5438;"
       onclick="document.getElementById('file-input').click()">
    <svg class="mx-auto mb-4 w-12 h-12 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
    </svg>
    <p class="text-gray-400 mb-1">ลากวางหรือคลิกเพื่อเลือกไฟล์</p>
    <p class="text-gray-600 text-sm">JPEG / PNG</p>
    <input id="file-input" type="file" accept="image/jpeg,image/png" class="hidden"/>
    <div id="file-name" class="mt-3 text-sm hidden" style="color:#FCBA54;"></div>
  </div>

  <button id="analyze-btn"
          class="mt-6 w-full py-3 rounded-lg font-semibold transition-colors disabled:cursor-not-allowed"
          style="background-color:#FCBA54; color:#122017;"
          disabled>
    วิเคราะห์
  </button>

  <div id="status" class="mt-4 hidden">
    <div class="flex items-center gap-3 rounded-lg p-4" style="background-color:#1a3020;">
      <div id="spinner" class="w-5 h-5 border-2 border-t-transparent rounded-full animate-spin hidden" style="border-color:#FCBA54; border-top-color:transparent;"></div>
      <span id="status-text" class="text-sm"></span>
    </div>
  </div>
</div>

<script>
const dropZone   = document.getElementById('drop-zone');
const fileInput  = document.getElementById('file-input');
const analyzeBtn = document.getElementById('analyze-btn');
const fileNameEl = document.getElementById('file-name');
const statusEl   = document.getElementById('status');
const statusText = document.getElementById('status-text');
const spinner    = document.getElementById('spinner');

let selectedFile = null;

fileInput.addEventListener('change', () => {
  if (fileInput.files.length) selectFile(fileInput.files[0]);
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#FCBA54'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#2d5438'; });
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.style.borderColor = '#2d5438';
  if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
});

function selectFile(f) {
  selectedFile = f;
  fileNameEl.textContent = f.name;
  fileNameEl.classList.remove('hidden');
  analyzeBtn.disabled = false;
  analyzeBtn.style.backgroundColor = '#FCBA54';
  analyzeBtn.style.color = '#122017';
}

analyzeBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  analyzeBtn.disabled = true;
  analyzeBtn.style.backgroundColor = '#234228';
  analyzeBtn.style.color = '#9ca3af';
  statusEl.classList.remove('hidden');
  spinner.classList.remove('hidden');
  statusText.textContent = 'กำลังวิเคราะห์...';
  statusText.className = 'text-sm';
  statusText.style.color = '#FCBA54';

  const formData = new FormData();
  formData.append('file', selectedFile);

  try {
    const res = await fetch('/analyze', {
      method: 'POST',
      headers: { 'x-auth-token': 'test' },
      body: formData,
    });
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.detail || 'Server error');
    }
    statusText.textContent = 'เสร็จแล้ว! กำลังเปลี่ยนหน้า…';
    statusText.style.color = '#4ade80';
    window.location.href = '/result/' + data.scan_id;
  } catch (err) {
    spinner.classList.add('hidden');
    statusText.textContent = 'ข้อผิดพลาด: ' + err.message;
    statusText.style.color = '#f87171';
    analyzeBtn.disabled = false;
    analyzeBtn.style.backgroundColor = '#FCBA54';
    analyzeBtn.style.color = '#122017';
  }
});
</script>
{% endblock %}
