server:
  host: "0.0.0.0"
  port: 8000

model:
  path: "models/best.pt"
  input_size: 640
  confidence_threshold: 0.25
  iou_threshold: 0.45

database:
  path: "data/results.db"

storage:
  captures_dir: "app/web/static/captures"
  visual_log_dir: "logs/img"

camera:
  width: 4608
  height: 2592

gpio:
  trigger_pin: 24 # BCM GPIO24 / physical pin 18

relay:
  red_pin:    21  # BCM GPIO21 / physical pin 40 — Error state
  yellow_pin: 20  # BCM GPIO20 / physical pin 38 — Processing state
  green_pin:  12  # BCM GPIO12 / physical pin 32 — Ready / OK state
  active_low: true  # true = LOW triggers relay (most common modules); false = HIGH triggers

display:
  lcd_address: 0x27 # I2C address of the LCD backpack
  tm1637_clk: 5
  tm1637_dio: 6
