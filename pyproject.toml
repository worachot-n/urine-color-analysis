[project]
name = "urine-color-analysis"
version = "0.1.0"
description = "Automated urine color analysis system for Raspberry Pi"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "opencv-python",
    "numpy",
    "flask",
    "werkzeug",
    "python-dotenv",
    "requests",
    "RPi.GPIO>=0.7.1",
    "smbus2>=0.4.3",
    "picamera2>=0.3.12",
]

[dependency-groups]
dev = [
    "pytest",
]

[project.scripts]
urine-analyzer = "main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.pytest.ini_options]
testpaths = ["tests"]
