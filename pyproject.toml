[project]
name = "urine-color-analysis"
version = "0.1.0"
description = "Automated urine color analysis system for Raspberry Pi"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "opencv-python",
    "numpy",
    "flask",
    "werkzeug",
    "python-dotenv",
    "requests",
    # "RPi.GPIO>=0.7.1",
    # "smbus2>=0.4.3",
    # "picamera2>=0.3.12",
    "ultralytics>=8.4.24",
]

[dependency-groups]
dev = [
    "pytest",
]

[project.scripts]
urine-analyzer = "main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.pytest.ini_options]
testpaths = ["tests"]

# ---------------------------------------------------------------------------
# Sample-area crop applied before YOLO inference (px trimmed from each edge)
#   x1 = left              y1 = top
#   x2 = frame_w - right   y2 = frame_h - bottom
# ---------------------------------------------------------------------------
[tool.urine-analyzer.sample_roi]
top    = 220
bottom = 20
left   = 200
right  = 800
