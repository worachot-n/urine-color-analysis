# =============================================================================
# Urine Color Analysis — Configuration
# Edit this file to change any system setting.
# =============================================================================

# =============================================================================
# GPIO PIN ASSIGNMENTS (BCM Numbering)
# =============================================================================

# TM1637 7-Segment Displays (5 units, one per hydration level H0-H4)
[gpio.tm1637]
H0 = { CLK = 4,  DIO = 17 }   # Level 0 (Well Hydrated)
H1 = { CLK = 27, DIO = 22 }   # Level 1
H2 = { CLK = 5,  DIO = 6  }   # Level 2
H3 = { CLK = 13, DIO = 19 }   # Level 3
H4 = { CLK = 26, DIO = 16 }   # Level 4 (Dehydrated)

# LCD 16x4 via I2C
[gpio.lcd]
sda         = 2      # I2C Data  (physical pin 3)
scl         = 3      # I2C Clock (physical pin 5)
i2c_address = 0x27
i2c_bus     = 1      # Bus 1 on Raspberry Pi 3/4/5
cols        = 16
rows        = 4

# 3-Channel Relay Module (controls LED Tower — ACTIVE LOW)
[gpio.relay]
led_red    = 21   # Relay 1 → Red LED
led_yellow = 20   # Relay 2 → Yellow LED
led_green  = 12   # Relay 3 → Green LED
active_low = true # GPIO LOW = relay energized

# Push Button
[gpio.button]
pin         = 24   # GPIO24 / Pin 18 — active LOW, internal pull-up
debounce_ms = 300

# Power supply pins (physical pin numbers — documentation only)
[gpio.power]
vcc_3v3 = 1   # Physical pin 1
vcc_5v  = 2   # Physical pin 2
gnd     = 6   # Physical pin 6

# =============================================================================
# CAMERA SETTINGS
# =============================================================================
[camera]
capture_resolution = [4608, 2592]   # Camera Module 3 maximum resolution
awb_lock           = true           # Lock auto white-balance after warm-up
ae_lock            = true           # Lock auto exposure after warm-up
rotate_180         = true           # Camera is mounted upside-down
jpeg_quality       = 95             # JPEG encode quality sent to server (0-100)

# =============================================================================
# IMAGE PROCESSING — CLAHE + Glare Handling
# =============================================================================
[image_processing]
clahe_clip_limit   = 2.0   # CLAHE clip limit for L-channel normalization (pre-HoughCircles + pre-YOLO)
clahe_tile_size    = 8     # CLAHE tile grid size (NxN)
glare_l_threshold  = 220   # OpenCV 8-bit Lab L* cutoff; pixels above treated as glare
glare_min_valid_px = 10    # Min non-glare pixels required to use masked median for color extraction

# =============================================================================
# COLOR ANALYSIS
# =============================================================================
[color_analysis]
outer_crop_px      = 15    # Pixels to shrink from bottle edge (excludes plastic ring)
inner_crop_px      = 10    # Pixels from bottle center to exclude (excludes glare hot-spot)
                            # Sampling region = annular ring between inner_crop_px and (radius - outer_crop_px)
delta_e_threshold  = 15.0  # Legacy — kept for reference; confidence now uses margin
confidence_margin  = 3.0   # second_best_ΔE − best_ΔE must exceed this for 'Confident'
max_delta_e        = 18.0  # Reject classification if best chromaticity ΔE exceeds this — sample reported as out-of-range
presence_threshold = 15.0  # Max ΔE to nearest reference level to confirm bottle present
                            # Background paper scores >>15; real bottles score <15
contrast_threshold = 12.0  # Min ΔE to white paper — below this = ghost (old pipeline)
ghost_de_threshold  = 8.0  # Stricter ΔE to white paper for YOLO path anti-ghosting
color_levels       = 5     # Number of distinct color levels (L0-L4)
refs_per_level     = 3     # Reference bottles per level in reference row

# Histogram-matching classifier (CIE Lab a*/b* 2D histogram + Bhattacharyya)
hist_bins_a        = 16          # a* histogram bins
hist_bins_b        = 16          # b* histogram bins
hist_range_a       = [80, 180]   # OpenCV-Lab a* sampling range (128 = neutral)
hist_range_b       = [80, 180]   # OpenCV-Lab b* sampling range
weight_chroma      = 0.5         # Weight on (chroma_de / chroma_scale) in hybrid score
weight_hist        = 0.5         # Weight on Bhattacharyya distance in hybrid score
chroma_scale       = 18.0        # Divide chroma ΔE by this so chroma score ≈ 1.0 at threshold
max_combined_score = 0.6         # Reject classification if hybrid score exceeds this
combined_margin    = 0.10        # second_best − best > margin → 'confident'

# =============================================================================
# WHITE BALANCE — chromatic adaptation using user-designated neutral patches
# (cells flagged is_white_reference=true in slot_config). When no WB cells are
# configured, WB is disabled silently (chroma classification is unaffected
# because the offset cancels in within-frame relative ΔE).
# =============================================================================
[white_balance]
enabled = true

# =============================================================================
# NETWORK / HOTSPOT
# =============================================================================
[network]
hotspot_ssid         = "signal"
hotspot_password     = "angad@1234"
hotspot_ip           = "10.42.0.1"   # nmcli hotspot default on Pi OS / NetworkManager
wifi_connect_timeout = 30            # Seconds to wait for WiFi association

