# =============================================================================
# YOLO DETECTION
# =============================================================================
[yolo]
model_path          = "models/best.pt"
imgsz               = 640
conf_threshold      = 0.20       # Confidence threshold — low enough to catch glare/edge bottles
iou_threshold       = 0.45       # NMS IoU — keeps closely-spaced bottles from merging
augment             = false      # TTA disabled — lowers confidence scores on fixed-angle camera
snapshots           = 1          # One snapshot is sufficient for YOLO bottle detection
snapshot_delay_ms   = 200        # Milliseconds between snapshots (unused with snapshots=1)
exposure_variation  = 0.15       # ±15% ExposureTime variation (unused with snapshots=1)
consensus_min_votes = 1          # Must match snapshots value
consensus_iou       = 0.50       # IoU threshold for matching boxes across snapshots
box_min_px          = 120        # Min box side in ORIGINAL image pixels (valid bottle lower bound)
box_max_px          = 220        # Max box side in ORIGINAL image pixels (valid bottle upper bound)
slot_max_dist_ratio = 0.60       # Max distance from slot center as fraction of slot radius
clahe_clip_limit    = 2.0        # CLAHE clip for pre-inference enhancement
clahe_tile_size     = 8          # CLAHE tile grid size (NxN)
roi_padding_px      = 10         # Padding (px) added around grid corners for ROI crop

# =============================================================================
# SAMPLE ROI — Fixed-margin crop fed to YOLO (excludes reference row)
#
# Each value is pixels trimmed FROM that edge of the full frame:
#   y1 = top              y2 = frame_height − bottom
#   x1 = left             x2 = frame_width  − right
# =============================================================================
[sample_roi]
top    = 220    # trim reference row from top
bottom = 20     # trim small margin at bottom
left   = 200    # trim dead-zone column on left
right  = 800    # if > frame width − left, no right-side crop is applied

# =============================================================================
# SYSTEM SAFETY
# =============================================================================
[system]
watchdog_timeout_sec = 60   # Max seconds per processing cycle

# =============================================================================
# GOOGLE INTEGRATION (server-side only)
# 1. Create a Service Account in Google Cloud Console.
# 2. Grant it Editor access to your Spreadsheet and Viewer/Contributor to your Drive folder.
# 3. Download the JSON key and save it as credentials/credentials.json.
# 4. Fill in drive_folder_id and spreadsheet_id below.
# =============================================================================
[google]
service_account_file = "credentials/credentials.json"   # Service account key JSON
drive_folder_id      = ""          # Google Drive folder ID for annotated images
spreadsheet_id       = ""          # Single Google Spreadsheet ID
slots_tab            = "SlotAssignment"
results_tab          = "Results"

# =============================================================================
# LOGGING / DEBUG
# =============================================================================
[debug]
enabled = true
log_dir = "logs/"          # Text logs directory
img_dir = "logs/img/"      # Annotated scan images (used by YOLO detector debug output)
