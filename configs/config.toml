# =============================================================================
# Urine Color Analysis — Configuration
# Edit this file to change any system setting.
# =============================================================================

# =============================================================================
# GPIO PIN ASSIGNMENTS (BCM Numbering)
# =============================================================================

# TM1637 7-Segment Displays (5 units, one per hydration level H0-H4)
[gpio.tm1637]
H0 = { CLK = 4,  DIO = 17 }   # Level 0 (Well Hydrated)
H1 = { CLK = 27, DIO = 22 }   # Level 1
H2 = { CLK = 5,  DIO = 6  }   # Level 2
H3 = { CLK = 13, DIO = 19 }   # Level 3
H4 = { CLK = 26, DIO = 16 }   # Level 4 (Dehydrated)

# LCD 16x4 via I2C
[gpio.lcd]
sda         = 2      # I2C Data  (physical pin 3)
scl         = 3      # I2C Clock (physical pin 5)
i2c_address = 0x27
i2c_bus     = 1      # Bus 1 on Raspberry Pi 3/4/5
cols        = 16
rows        = 4

# 3-Channel Relay Module (controls LED Tower — ACTIVE LOW)
[gpio.relay]
led_red    = 21   # Relay 2 → Red LED
led_yellow = 20   # Relay 1 → Yellow LED
led_green  = 12   # Relay 3 → Green LED
active_low = true # GPIO LOW = relay energized

# Push Button
[gpio.button]
pin         = 24   # GPIO24 / Pin 18 — active LOW, internal pull-up
debounce_ms = 50

# Power supply pins (physical pin numbers — documentation only)
[gpio.power]
vcc_3v3 = 1   # Physical pin 1
vcc_5v  = 2   # Physical pin 2
gnd     = 6   # Physical pin 6

# =============================================================================
# CAMERA SETTINGS
# =============================================================================
[camera]
capture_resolution = [4608, 2592]   # Camera Module 3 maximum resolution
awb_lock           = true           # Lock auto white-balance after warm-up
ae_lock            = true           # Lock auto exposure after warm-up
rotate_180         = true           # Camera is mounted upside-down

# =============================================================================
# IMAGE PROCESSING — Red Cap Detection
# =============================================================================
[image_processing]

# HSV ranges for red — widened saturation to 50 to catch printed ring variants under shadow
hsv_red_lower_1    = [0,   50,  50]
hsv_red_upper_1    = [10, 255, 255]
hsv_red_lower_2    = [160,  50,  50]
hsv_red_upper_2    = [180, 255, 255]

# Morphological cleanup
morph_kernel_size    = 5
gaussian_blur_kernel = [5, 5]
morph_close_large    = 21    # wider close to bridge large glare-caused ring gaps

# Contour-based circle detection (replaces HoughCircles)
min_contour_area      = 80     # pixels² — accept smaller arc fragments after large closing pass
max_contour_area      = 20000  # pixels² — maximum valid ring contour
circularity_threshold = 0.45   # 4π·Area/Perimeter² — relaxed to accept broken/arc-shaped rings

# Two-step bottle presence verification
red_ring_min_pixels = 30   # min non-zero pixels in slot bbox on closed red mask

# Glare / specular reflection handling
clahe_clip_limit   = 2.0   # CLAHE clip limit for V-channel normalization
clahe_tile_size    = 8     # CLAHE tile grid size (NxN)
glare_l_threshold  = 220   # OpenCV 8-bit Lab L* cutoff (255=white); pixels above = glare
glare_min_valid_px = 10    # Min non-glare pixels required to use masked median

# =============================================================================
# COLOR ANALYSIS
# =============================================================================
[color_analysis]
inner_crop_px     = 15    # Pixels to shrink from each side of bottle crop
delta_e_threshold = 15.0  # Legacy — kept for reference; confidence now uses margin
confidence_margin  = 3.0   # second_best_ΔE − best_ΔE must exceed this for 'Confident'
presence_threshold = 15.0  # Max ΔE to nearest reference level to confirm bottle present
                            # Background paper scores >>15; real bottles score <15
contrast_threshold = 12.0  # Min ΔE to white paper — below this = ghost (old pipeline)
ghost_de_threshold  = 8.0   # Stricter ΔE to white paper for YOLO path anti-ghosting
ref_inner_crop_px  = 25    # Larger inner crop for reference bottles (ignores red ring edge)
color_levels      = 5     # Number of distinct color levels (L0-L4)
refs_per_level    = 3     # Reference bottles per level in reference row

# =============================================================================
# GRID CONFIGURATION
# =============================================================================
[grid]
config_file    = "grid_config.json"
color_json_file = "color.json"
cols           = 16               # 16 columns of lines (col 0 = ZZ dead zone)
rows           = 14               # 14 rows of lines (row 0 = reference, 1-12 = samples)
groups         = ["A1", "A2", "A3", "A4"]
slots_per_group = 9               # Slots 1-9 per group
levels         = [0, 1, 2, 3, 4]

# =============================================================================
# NETWORK / HOTSPOT
# =============================================================================
[network]
hotspot_ssid         = "signal"
hotspot_password     = "angad@1234"
hotspot_ip           = "10.42.0.1"   # nmcli hotspot default on Pi OS / NetworkManager
wifi_connect_timeout = 30            # Seconds to wait for WiFi association

# =============================================================================
# WEB SERVER
# =============================================================================
[web_server]
port               = 5000
captive_portal_port = 8080   # Port 80 reserved; use 8080 for WiFi setup portal

# =============================================================================
# TELEGRAM
# =============================================================================
[telegram]
token   = "8767463351:AAF7fd0opVuizOoJBgxWWEH2qn85aydXHVg"
chat_id = "-1003801438507"

# =============================================================================
# YOLO DETECTION
# =============================================================================
[yolo]
model_path          = "models/best.pt"
imgsz               = 640
conf_threshold      = 0.40
iou_threshold       = 0.45       # NMS IoU threshold
augment             = false      # TTA disabled — lowers confidence scores on fixed-angle camera
snapshots           = 1          # One snapshot is sufficient for YOLO bottle detection
snapshot_delay_ms   = 200        # Milliseconds between snapshots (unused with snapshots=1)
exposure_variation  = 0.15       # ±15% ExposureTime variation (unused with snapshots=1)
consensus_min_votes = 1          # Must match snapshots value
consensus_iou       = 0.50       # IoU threshold for matching boxes across snapshots
box_min_px          = 15         # Min box width & height in 640px space — calibrated for full-grid ROI (~32px bottles)
box_max_px          = 60         # Max box width & height in 640px space
slot_max_dist_ratio = 0.60       # Max distance from slot center as fraction of slot radius
clahe_clip_limit    = 2.0        # CLAHE clip for pre-inference enhancement
clahe_tile_size     = 8          # CLAHE tile grid size (NxN)
roi_padding_px      = 10         # Padding (px) added around grid corners for ROI crop

# =============================================================================
# SAMPLE ROI — Fixed-margin crop fed to YOLO (excludes reference row)
#
# Each value is pixels trimmed FROM that edge of the full frame:
#   y1 = top              y2 = frame_height − bottom
#   x1 = left             x2 = frame_width  − right
#
# If a margin would make x2 ≤ x1 or y2 ≤ y1 (margin larger than the frame),
# that side falls back to the frame boundary (no crop on that side).
#
# Coordinate translation: detect_once() automatically adds (x1, y1) back to
# every returned bounding box so all downstream code stays in full-frame space.
# =============================================================================
[sample_roi]
top    = 220    # trim reference row from top
bottom = 20     # trim small margin at bottom
left   = 200    # trim dead-zone column on left
right  = 800    # if > frame width − left, no right-side crop is applied

# =============================================================================
# SYSTEM SAFETY
# =============================================================================
[system]
watchdog_timeout_sec = 60   # Max seconds per processing cycle (increased for YOLO multi-snapshot)

# =============================================================================
# LOGGING / DEBUG
# =============================================================================
[debug]
enabled = true
log_dir = "logs/"          # Text logs directory
img_dir = "logs/img/"      # Annotated scan images
db_path = "logs/scan_results.db"  # SQLite database
