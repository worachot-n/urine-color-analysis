<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>กำลังเชื่อมต่อ...</title>
  <link rel="icon" href="/static/logo.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Kanit', sans-serif;
      background: #122017;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .logo-wrap {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #FCBA54;
      overflow: hidden;
      margin-bottom: 1.4rem;
      background: #1a3028;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      color: #fff;
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 2rem;
      text-align: center;
    }
    h1 span {
      color: #FCBA54;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .info-wrap {
      width: 100%;
      max-width: 520px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.2rem;
    }
    .field-label {
      color: #fff;
      font-size: 1.05rem;
      font-weight: 500;
      white-space: nowrap;
      min-width: 160px;
      text-align: right;
    }
    .field-value {
      flex: 1;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      background: #fff;
      color: #222;
      font-size: 1rem;
      word-break: break-all;
    }

    .status-box {
      margin-top: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #FCBA54;
      font-size: 1rem;
      font-weight: 500;
    }

    /* Spinning indicator */
    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(252,186,84,0.3);
      border-top-color: #FCBA54;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <img src="/static/logo.ico" alt="Logo">
  </div>

  <h1>การเชื่อมต่อ <span>Wifi</span></h1>

  <div class="info-wrap">
    <div class="field">
      <span class="field-label">SSID Wifi</span>
      <div class="field-value">{{ ssid }}</div>
    </div>

    <div class="field">
      <span class="field-label">รหัสผ่าน Wifi</span>
      <div class="field-value">{{ password }}</div>
    </div>

    <div class="status-box">
      <div class="spinner"></div>
      <span>กำลังเชื่อมต่อ... อาจใช้เวลาสูงสุด 30 วินาที</span>
    </div>
  </div>

</body>
</html>
