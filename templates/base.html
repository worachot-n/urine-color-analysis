<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      {% include 'global.css' %}

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Kanit', 'Segoe UI', sans-serif;
        background: var(--color-dark);
        color: var(--color-white);
        min-height: 100vh;
      }

      /* ── Navbar ── */
      .navbar {
        background: var(--color-green-1);
        display: flex;
        align-items: center;
        gap: 1.5rem;
        padding: 0.65rem 1.4rem;
        border-bottom: 2px solid var(--color-green-2);
      }

      .navbar-logo {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 2px solid var(--color-accent);
        background: var(--color-green-2);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
      }

      .navbar-links {
        display: flex;
        gap: 2rem;
        list-style: none;
      }

      .navbar-links a {
        color: var(--color-white);
        text-decoration: none;
        font-size: 1rem;
        font-weight: 500;
        padding-bottom: 3px;
        border-bottom: 2px solid transparent;
        transition: color 0.15s, border-color 0.15s;
      }

      .navbar-links a.active {
        color: var(--color-accent);
        border-bottom-color: var(--color-accent);
      }

      .navbar-links a:hover:not(.active) {
        color: var(--color-accent);
      }

      /* ── Page wrapper ── */
      .page {
        padding: 1.5rem;
      }

      /* ── Urine color level badge ── */
      .level-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.2rem 0.7rem;
        border-radius: 4px;
        font-weight: bold;
        font-size: 0.9rem;
        color: var(--color-white);
        min-width: 52px;
      }
      .level-badge.lvl-0 { background: var(--color-level-0); color: #333; }
      .level-badge.lvl-1 { background: var(--color-level-1); }
      .level-badge.lvl-2 { background: var(--color-level-2); }
      .level-badge.lvl-3 { background: var(--color-level-3); }
      .level-badge.lvl-4 { background: var(--color-level-4); }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-logo">
        <img src="/assets/logo.ico" alt="logo" />
      </div>
      <ul class="navbar-links">
        <li>
          <a href="/" class="{% if active == 'results' %}active{% endif %}"
            >ผลการตรวจ</a
          >
        </li>
        <li>
          <a
            href="/analysis"
            class="{% if active == 'analysis' %}active{% endif %}"
            >การวิเคราะห์</a
          >
        </li>
        <li>
          <a
            href="/calibrate"
            class="{% if active == 'calibrate' %}active{% endif %}"
            >การตั้งค่า</a
          >
        </li>
      </ul>
    </nav>
    <div class="page">{% block content %}{% endblock %}</div>
  </body>
</html>
